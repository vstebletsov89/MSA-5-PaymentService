spring:
  application:
    name: payment-orchestrator

zeebe:
  client:
    broker:
      grpc-address: http://${ZEEBE_ADDRESS:zeebe:26500}
      rest-address: http://${ZEEBE_REST_ADDRESS:zeebe:8080}
    security:
      plaintext: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.orchestrpay: DEBUG
    io.camunda: DEBUG
    io.camunda.zeebe: DEBUG